name: Auto-merge Jules
on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    # Only allow the Jules AI agent — not personal accounts
    if: github.actor == 'google-labs-jules'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-manage PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # 1. Mark as ready for review (if it is a draft)
          gh pr ready "$PR_URL" || true

          # 2. Approve the PR
          gh pr review --approve "$PR_URL"

          # 3. Merge immediately
          gh pr merge --auto --merge --delete-branch "$PR_URL"
