name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync
      - name: Install Playwright
        run: uv run playwright install --with-deps chromium

      - name: Run Ruff
        run: uv run ruff check core/ ui/ tests/

      - name: Run unit tests with pytest
        run: uv run pytest tests/unit/ --cov=core --cov-report=xml --cov-report=term-missing

      - name: Run integration smoke tests
        run: uv run pytest tests/integration/test_integration_smoke.py --no-cov

  ui-tests:
    name: UI / E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test-and-lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps chromium

      - name: Run UI Tests
        env:
          PYTEST_WORKERS: "4"
        run: bash scripts/linux_test_ui.sh

      - name: Upload Failure Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-failures
          path: tests/results/failures/
          retention-days: 7

  gpu-tests:
    name: GPU Integration Tests (Dry Run)
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Run GPU E2E Tests (Mocked Skip)
        run: uv run pytest tests/integration/test_gpu_e2e.py -m gpu_e2e
