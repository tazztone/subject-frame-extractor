name: Update Documentation

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'scripts/update_agents_md.py'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Run Update Script
        run: uv run python scripts/update_agents_md.py

      - name: Commit changes
        # stefanzweifel/git-auto-commit-action v5.2.0
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403
        with:
          commit_message: "docs: update code reference skeletons"
          file_pattern: "AGENTS_CODE_REFERENCE.md tests/TESTS_CODE_REFERENCE.md"
