# UX Testing Workflow
# Runs unit tests, visual regression, component verification, and accessibility tests

name: UX Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'core/**'
      - 'ui/**'
      - 'tests/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'ui/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Update visual regression baselines'
        required: false
        type: boolean
        default: false

jobs:
  ux-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync
          uv run playwright install --with-deps chromium
      
      - name: Download baselines artifact
        uses: actions/download-artifact@v4
        with:
          name: visual-baselines
          path: tests/ui/baselines
        continue-on-error: true  # First run or empty project won't have baselines
      
      - name: Run UX Audit Suite
        run: |
          # run_ux_audit.py handles starting mock_app.py and running UI tests
          uv run python scripts/run_ux_audit.py ${{ github.event.inputs.update_baselines == 'true' && '--update-baselines' || '' }}
      
      - name: Run Detailed Accessibility Audit
        run: |
          # Explicit run to ensure accessibility report is generated regardless of audit script limits
          uv run pytest tests/ui/test_accessibility.py -v
      
      - name: Upload baselines artifact
        if: github.event.inputs.update_baselines == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/ui/baselines
          retention-days: 90
      
      - name: Upload screenshots and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-test-artifacts
          path: |
            tests/ui/screenshots
            tests/ui/diffs
            ux_reports/
          retention-days: 30
